<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Конструктор листовки сотрудника · Dalli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'FlyerBold';
    src: url('fonts/flyer-font-bold.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'FlyerMedium';
    src: url('fonts/flyer-font-medium.ttf') format('truetype');
    font-display: swap;
  }
  :root {
    --bg: #0a1422;
    --panel: #13233c;
    --panel-2: #1a2d4a;
    --border: #25395a;
    --text: #e8eef7;
    --muted: #8ea1bf;
    --cyan: #00cff2;
    --cyan-dim: rgba(0, 207, 242, 0.15);
    --gold-1: #98804F;
    --gold-2: #F8D181;
    --gold-3: #FFE7B6;
    --danger: #ff6b6b;
    --radius: 10px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 400px;
    height: 100vh;
    gap: 0;
  }

  /* ------ LEFT: Preview ------ */
  .preview-pane {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    background:
      radial-gradient(ellipse at top, #152943 0%, var(--bg) 70%);
    overflow: hidden;
    position: relative;
    min-height: 0;
  }

  .preview-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    max-height: 100%;
    min-height: 0;
  }

  .preview-frame {
    position: relative;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 612 / 859;
    max-height: 100%;
    max-width: 100%;
    height: calc(100vh - 100px);
    width: auto;
    background: #000;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .preview-frame.dragging { cursor: grabbing; }
  .preview-frame.no-photo { cursor: default; }

  .preview-frame canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .preview-caption {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hint-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .hint-overlay.hidden { display: none; }
  .hint-overlay .pill {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    padding: 10px 18px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* ------ RIGHT: Controls ------ */
  .controls-pane {
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .header p {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .section {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-of-type { border-bottom: none; }

  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .section-title .num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--cyan-dim);
    color: var(--cyan);
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 700;
  }

  label.field {
    display: block;
    margin-bottom: 14px;
  }
  label.field:last-child { margin-bottom: 0; }

  .field-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    transition: border-color 0.15s;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--cyan);
  }
  textarea { min-height: 60px; }

  /* File input custom */
  .file-upload {
    display: block;
    padding: 18px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    font-size: 13px;
    background: var(--bg);
  }
  .file-upload:hover {
    border-color: var(--cyan);
    color: var(--text);
    background: var(--panel-2);
  }
  .file-upload input { display: none; }
  .file-upload .icon {
    font-size: 22px;
    display: block;
    margin-bottom: 6px;
  }
  .file-upload .filename {
    color: var(--text);
    font-weight: 500;
    word-break: break-all;
  }

  /* Slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--cyan);
  }
  .slider-value {
    min-width: 42px;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  /* Buttons */
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 13px;
    padding: 10px 14px;
    transition: all 0.15s;
  }

  button.secondary {
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.secondary:hover {
    background: var(--panel-2);
    color: var(--text);
  }

  .footer {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
    margin-top: auto;
    position: sticky;
    bottom: 0;
  }

  button.primary {
    width: 100%;
    background: linear-gradient(90deg, #98804F 0%, #F8D181 30%, #FFE7B6 50%, #F8D181 70%, #98804F 100%);
    color: #2a1d00;
    font-weight: 700;
    padding: 14px;
    font-size: 14px;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(248, 209, 129, 0.25);
  }
  button.primary:hover:not(:disabled) {
    filter: brightness(1.08);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(248, 209, 129, 0.35);
  }
  button.primary:disabled {
    filter: grayscale(0.5) brightness(0.7);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .footer .note {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
    max-width: 80%;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--danger); }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive Fixes */
  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto; 
      height: auto;
      min-height: 100vh;
    }
    
    .preview-pane { 
      padding: 16px; 
    }
    
    .preview-frame {
      height: auto; 
      width: 100%;  
      max-width: 400px; 
      max-height: 65vh; 
    }

    .controls-pane { 
      border-left: none; 
      border-top: 1px solid var(--border); 
      overflow: visible; 
    }
    
    body { 
      overflow: auto; 
    }
  }
</style>
</head>
<body>

<div class="app">
  <div class="preview-pane">
    <div class="preview-inner">
      <div class="preview-frame no-photo" id="previewFrame">
        <canvas id="previewCanvas" width="1224" height="1718"></canvas>
        <div class="hint-overlay" id="hintOverlay">
          <div class="pill">Загрузите фото сотрудника справа →</div>
        </div>
      </div>
      <div class="preview-caption">Предпросмотр · 216 × 303 мм</div>
    </div>
  </div>

  <div class="controls-pane">
    <div class="header">
      <h1>Конструктор листовки</h1>
      <p>Загрузите фото, введите имя и достижение, скачайте PDF для печати.</p>
    </div>

    <div class="section">
      <div class="section-title"><span class="num">1</span>Фото сотрудника</div>

      <label class="file-upload" id="fileUploadLabel">
        <input type="file" id="photoInput" accept="image/*" />
        <span class="icon">⇪</span>
        <span id="fileStatus">Нажмите, чтобы выбрать изображение</span>
      </label>

      <div style="margin-top: 14px;" id="photoControls">
        <label class="field">
          <span class="field-label">Масштаб фото</span>
          <div class="slider-row">
            <input type="range" id="scaleSlider" min="1" max="4" step="0.01" value="1" disabled />
            <span class="slider-value" id="scaleValue">100%</span>
          </div>
        </label>
        <button class="secondary" id="resetPhotoBtn" disabled style="width: 100%;">Центрировать фото</button>
        <p style="margin: 10px 0 0; font-size: 11px; color: var(--muted); line-height: 1.5;">
          Перетащите фото курсором в круге, чтобы выбрать нужный фрагмент.
        </p>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="num">2</span>Имя сотрудника</div>
      <label class="field">
        <input type="text" id="nameInput" placeholder="Иван Иванов" value="Семён Окороков" maxlength="40" />
      </label>
    </div>

    <div class="section">
      <div class="section-title"><span class="num">3</span>Достижение</div>
      <label class="field">
        <textarea id="achievementInput" placeholder="За что награждён сотрудник" maxlength="140">Самая крутая машина</textarea>
      </label>
    </div>

    <div class="footer">
      <button class="primary" id="downloadBtn">Скачать PDF для печати</button>
      <div class="note">216×303 мм · готово к печати</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="pdfkit.standalone.js"></script>
<script src="blob-stream.js"></script>

<script>
// (Скрипт остается без изменений)
const PAGE_W = 612.008;
const PAGE_H = 859.008;
const CIRCLE_CX = 306.003;
const CIRCLE_CY = 305.542;
const CIRCLE_R  = 213.5;
const NAME_Y      = 575;
const NAME_H      = 46;
const ACHIEVE_Y   = 655;
const ACHIEVE_H   = 100;
const TEXT_MARGIN = 56;
const PREVIEW_SCALE = 2;
const BG_TOP    = '#020A1A';
const BG_BOTTOM = '#012A47';
const CYAN      = '#00CFF2';
const GOLD_DARK  = '#98804F';
const GOLD_WARM  = '#F8D181';
const GOLD_LIGHT = '#FFE7B6';
const STAR_BLUR_PX = 64;

const state = {
  photoImage: null,
  photoOffsetX: 0,
  photoOffsetY: 0,
  photoScale: 1,
  photoBaseScale: 1,
  name: 'Семён Окороков',
  achievement: 'Самая крутая машина',
};

const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');
const previewFrame = document.getElementById('previewFrame');
const hintOverlay = document.getElementById('hintOverlay');
const photoInput = document.getElementById('photoInput');
const fileStatus = document.getElementById('fileStatus');
const scaleSlider = document.getElementById('scaleSlider');
const scaleValue = document.getElementById('scaleValue');
const resetBtn = document.getElementById('resetPhotoBtn');
const nameInput = document.getElementById('nameInput');
const achievementInput = document.getElementById('achievementInput');
const downloadBtn = document.getElementById('downloadBtn');
const toast = document.getElementById('toast');

function showToast(msg, type = 'info', ms = 3000) {
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.className = 'toast'; }, ms);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function canvasToPt(cx, cy) {
  const r = previewFrame.getBoundingClientRect();
  return {
    x: (cx - r.left) * (PAGE_W / r.width),
    y: (cy - r.top)  * (PAGE_H / r.height),
  };
}

photoInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    state.photoImage = img;
    const circleDiameter = CIRCLE_R * 2;
    const coverScale = Math.max(circleDiameter / img.width, circleDiameter / img.height);
    state.photoBaseScale = coverScale * 1.15;
    state.photoOffsetX = 0;
    state.photoOffsetY = 0;
    state.photoScale = 1;
    scaleSlider.value = 1;
    scaleValue.textContent = '100%';
    scaleSlider.disabled = false;
    resetBtn.disabled = false;
    fileStatus.textContent = file.name;
    previewFrame.classList.remove('no-photo');
    hintOverlay.classList.add('hidden');
    draw();
  };
  img.src = URL.createObjectURL(file);
});

scaleSlider.addEventListener('input', (e) => {
  state.photoScale = parseFloat(e.target.value);
  scaleValue.textContent = Math.round(state.photoScale * 100) + '%';
  draw();
});

resetBtn.addEventListener('click', () => {
  state.photoOffsetX = 0;
  state.photoOffsetY = 0;
  state.photoScale = 1;
  scaleSlider.value = 1;
  scaleValue.textContent = '100%';
  draw();
});

let dragging = false;
let dragStart = null;
function onPointerDown(e) {
  if (!state.photoImage) return;
  const pt = canvasToPt(e.clientX, e.clientY);
  const dx = pt.x - CIRCLE_CX;
  const dy = pt.y - CIRCLE_CY;
  if (dx*dx + dy*dy > CIRCLE_R*CIRCLE_R) return;
  dragging = true;
  dragStart = {
    x: e.clientX, y: e.clientY,
    originX: state.photoOffsetX, originY: state.photoOffsetY,
  };
  previewFrame.classList.add('dragging');
  e.preventDefault();
}
function onPointerMove(e) {
  if (!dragging) return;
  const r = previewFrame.getBoundingClientRect();
  const scale = PAGE_W / r.width;
  const dx = (e.clientX - dragStart.x) * scale;
  const dy = (e.clientY - dragStart.y) * scale;
  state.photoOffsetX = dragStart.originX + dx;
  state.photoOffsetY = dragStart.originY + dy;
  clampPhotoOffset();
  draw();
}
function onPointerUp() {
  dragging = false;
  previewFrame.classList.remove('dragging');
}
function clampPhotoOffset() {
  if (!state.photoImage) return;
  const img = state.photoImage;
  const s = state.photoBaseScale * state.photoScale;
  const drawnW = img.width * s;
  const drawnH = img.height * s;
  const maxX = Math.max(0, drawnW / 2 - CIRCLE_R);
  const maxY = Math.max(0, drawnH / 2 - CIRCLE_R);
  state.photoOffsetX = clamp(state.photoOffsetX, -maxX, maxX);
  state.photoOffsetY = clamp(state.photoOffsetY, -maxY, maxY);
}

previewFrame.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
previewFrame.addEventListener('touchstart', (e) => {
  if (e.touches.length) onPointerDown(e.touches[0]);
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (e.touches.length) onPointerMove(e.touches[0]);
}, { passive: false });
window.addEventListener('touchend', onPointerUp);

nameInput.addEventListener('input', (e) => { state.name = e.target.value; draw(); });
achievementInput.addEventListener('input', (e) => { state.achievement = e.target.value; draw(); });

function draw() {
  const W = PAGE_W, H = PAGE_H;
  canvas.width = Math.round(W * PREVIEW_SCALE);
  canvas.height = Math.round(H * PREVIEW_SCALE);
  const c = canvas.getContext('2d');
  c.setTransform(PREVIEW_SCALE, 0, 0, PREVIEW_SCALE, 0, 0);
  c.clearRect(0, 0, W, H);

  const bg = c.createLinearGradient(532, 0, 217, 914);
  bg.addColorStop(0, '#020A1A');
  bg.addColorStop(1, '#012A47');
  c.fillStyle = bg;
  c.fillRect(0, 0, W, H);
  c.fillStyle = 'rgba(0,0,0,0.2)';
  c.fillRect(0, 0, W, H);

  c.save();
  c.filter = `blur(${STAR_BLUR_PX * 0.75}px)`;
  c.beginPath();
  const starPath = [[306.003, 63.057], [375.72, 166.645], [513.779, 134.079], [474.315, 248.009], [599.842, 305.542], [474.315, 363.075], [513.779, 477.005], [375.72, 444.439], [306.003, 548.027], [236.286, 444.439], [98.228, 477.005], [137.69, 363.075], [12.164, 305.542], [137.69, 248.009], [98.228, 134.079], [236.286, 166.645]];
  c.moveTo(starPath[0][0], starPath[0][1]);
  for (let i = 1; i < starPath.length; i++) c.lineTo(starPath[i][0], starPath[i][1]);
  c.closePath();
  const starGrad = c.createRadialGradient(CIRCLE_CX, CIRCLE_CY, 0, CIRCLE_CX, CIRCLE_CY, 290);
  starGrad.addColorStop(0, 'rgba(0, 207, 242, 0.77)');
  starGrad.addColorStop(0.636, 'rgba(0, 207, 242, 0.77)');
  starGrad.addColorStop(1, 'rgba(0, 207, 242, 0)');
  c.fillStyle = starGrad;
  c.fill();
  c.restore();

  if (state.photoImage) {
    c.save();
    c.beginPath();
    c.arc(CIRCLE_CX, CIRCLE_CY, CIRCLE_R, 0, Math.PI * 2);
    c.clip();
    const img = state.photoImage;
    const s = state.photoBaseScale * state.photoScale;
    const drawnW = img.width * s;
    const drawnH = img.height * s;
    const x = CIRCLE_CX - drawnW / 2 + state.photoOffsetX;
    const y = CIRCLE_CY - drawnH / 2 + state.photoOffsetY;
    c.drawImage(img, x, y, drawnW, drawnH);
    c.restore();
  } else {
    c.save();
    c.beginPath();
    c.arc(CIRCLE_CX, CIRCLE_CY, CIRCLE_R, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255, 255, 255, 0.03)';
    c.fill();
    c.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    c.lineWidth = 2;
    c.stroke();
    c.restore();
  }

  drawGoldText(c, state.name, NAME_Y, NAME_H, 42, true);
  drawGoldText(c, state.achievement, ACHIEVE_Y, ACHIEVE_H, 30, false);
}

function drawGoldText(c, text, yTop, boxH, initialFontSize, bold) {
  if (!text || !text.trim()) return;
  const maxWidth = PAGE_W - 2 * TEXT_MARGIN;
  const fontFamily = bold ? 'FlyerBold, sans-serif' : 'FlyerMedium, sans-serif';
  let fontSize = initialFontSize;
  c.font = `${fontSize}px ${fontFamily}`;
  const lines = wrapText(c, text, maxWidth);
  const lineHeight = fontSize * 1.15;
  const totalH = lines.length * lineHeight;
  const centerY = yTop + boxH / 2;
  const startY = centerY - totalH / 2 + lineHeight * 0.8;
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  const g = c.createLinearGradient(TEXT_MARGIN, 0, PAGE_W - TEXT_MARGIN, 0);
  g.addColorStop(0, '#98804F'); g.addColorStop(0.3, '#F8D181'); g.addColorStop(0.5, '#FFE7B6'); g.addColorStop(0.7, '#F8D181'); g.addColorStop(1, '#98804F');
  c.fillStyle = g;
  lines.forEach((line, i) => c.fillText(line, PAGE_W / 2, startY + i * lineHeight));
}

function wrapText(c, text, maxWidth) {
  const words = text.trim().split(/\s+/);
  const lines = [];
  let current = '';
  for (const w of words) {
    const test = current ? current + ' ' + w : w;
    if (c.measureText(test).width > maxWidth && current) {
      lines.push(current); current = w;
    } else { current = test; }
  }
  if (current) lines.push(current);
  return lines;
}

// PDF Generation logic continues...
async function generatePDF() {
  if (!state.photoImage) {
    showToast('Сначала загрузите фотографию', 'error');
    return;
  }

  const origLabel = downloadBtn.innerHTML;
  downloadBtn.disabled = true;
  downloadBtn.innerHTML = '<span class="spinner"></span>Создание PDF...';

  try {
    // Load font
    const fontBuffer = await loadFontBytes();

    // Create document
    // eslint-disable-next-line no-undef
    const doc = new PDFDocument({
      size: [PAGE_W, PAGE_H],
      margin: 0,
      info: {
        Title: `Листовка - ${state.name}`,
        Creator: 'Dalli HR Flyer Designer',
      },
    });

    // eslint-disable-next-line no-undef
    const stream = doc.pipe(blobStream());

    // Register both font weights
    doc.registerFont('FlyerBold', fontBuffer.bold);
    doc.registerFont('FlyerMedium', fontBuffer.medium);

    // --- 1. Background: dark navy linear gradient (RGB) ---
    const bgGrad = doc.linearGradient(532, 0, 217, 914);
    bgGrad.stop(0, BG_TOP);
    bgGrad.stop(1, BG_BOTTOM);
    doc.rect(0, 0, PAGE_W, PAGE_H).fill(bgGrad);

    // Subtle 20% black overlay to match template tone
    doc.save();
    doc.fillOpacity(0.2).fillColor('#000000');
    doc.rect(0, 0, PAGE_W, PAGE_H).fill();
    doc.restore();

    // --- 2. Blurred star glow (PNG with alpha — PDFKit can't do Gaussian blur natively) ---
    const starPNG = buildStarGlowPNG();
    const starBytes = dataURLtoArrayBuffer(starPNG);
    doc.image(starBytes, 0, 0, { width: PAGE_W, height: PAGE_H });

    // --- 3. Photo clipped to circle (JPEG + vector clip path) ---
    const photoJPEG = buildPhotoJPEG();
    const photoBytes = dataURLtoArrayBuffer(photoJPEG);
    doc.save();
    doc.circle(CIRCLE_CX, CIRCLE_CY, CIRCLE_R).clip();
    doc.image(photoBytes,
      CIRCLE_CX - CIRCLE_R,
      CIRCLE_CY - CIRCLE_R,
      { width: CIRCLE_R * 2, height: CIRCLE_R * 2 }
    );
    doc.restore();

    // --- 4. Name text with gold gradient ---
    if (state.name && state.name.trim()) {
      const maxW = PAGE_W - 2 * TEXT_MARGIN;
      const { size, lines } = fitText(doc, state.name, 'FlyerBold', 42, maxW, 2);
      const lineH = size * 1.15;
      const totalH = lines.length * lineH;
      const startY = NAME_Y + (NAME_H - totalH) / 2;

      const goldGrad = doc.linearGradient(TEXT_MARGIN, 0, PAGE_W - TEXT_MARGIN, 0);
      goldGrad.stop(0, GOLD_DARK);
      goldGrad.stop(0.297, GOLD_WARM);
      goldGrad.stop(0.505, GOLD_LIGHT);
      goldGrad.stop(0.707, GOLD_WARM);
      goldGrad.stop(1, GOLD_DARK);

      doc.fillColor(goldGrad);
      doc.font('FlyerBold').fontSize(size);
      lines.forEach((line, i) => {
        const w = doc.widthOfString(line);
        doc.text(line, (PAGE_W - w) / 2, startY + i * lineH, { lineBreak: false });
      });
    }

    // --- 5. Achievement text ---
    if (state.achievement && state.achievement.trim()) {
      const maxW = PAGE_W - 2 * TEXT_MARGIN;
      const { size, lines } = fitText(doc, state.achievement, 'FlyerMedium', 30, maxW, 3);
      const lineH = size * 1.15;
      const totalH = lines.length * lineH;
      const startY = ACHIEVE_Y + (ACHIEVE_H - totalH) / 2;

      const goldGrad2 = doc.linearGradient(TEXT_MARGIN, 0, PAGE_W - TEXT_MARGIN, 0);
      goldGrad2.stop(0, GOLD_DARK);
      goldGrad2.stop(0.297, GOLD_WARM);
      goldGrad2.stop(0.505, GOLD_LIGHT);
      goldGrad2.stop(0.707, GOLD_WARM);
      goldGrad2.stop(1, GOLD_DARK);

      doc.fillColor(goldGrad2);
      doc.font('FlyerMedium').fontSize(size);
      lines.forEach((line, i) => {
        const w = doc.widthOfString(line);
        doc.text(line, (PAGE_W - w) / 2, startY + i * lineH, { lineBreak: false });
      });
    }

    // Finalize
    doc.end();
    const blob = await new Promise((resolve, reject) => {
      stream.on('finish', () => resolve(stream.toBlob('application/pdf')));
      stream.on('error', reject);
    });

    // Trigger download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = (state.name || 'flyer').replace(/[^\p{L}\p{N}\s-]+/gu, '').trim().replace(/\s+/g, '_') || 'flyer';
    a.download = `${safeName}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    showToast('PDF создан и загружен');
  } catch (err) {
    console.error(err);
    showToast('Ошибка при создании PDF: ' + (err.message || err), 'error', 6000);
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.innerHTML = origLabel;
  }
}

downloadBtn.addEventListener('click', generatePDF);
draw();
window.addEventListener('resize', draw);
</script>

</body>
</html>
